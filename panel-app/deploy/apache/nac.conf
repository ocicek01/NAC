<VirtualHost *:80>
    ServerName nac.hakkari.edu.tr
    ServerAdmin admin@localhost

    DocumentRoot /opt/nac/panel-app/public

    <Directory /opt/nac/panel-app/public>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
        DirectoryIndex index.php
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off

    # Keep Laravel-owned NAC endpoints on Apache/PHP instead of forwarding them
    # to the legacy backend listening on :8080.
    ProxyPass /api/events/ports !
    ProxyPass /api/zones !
    ProxyPass /api/switches !
    ProxyPass /api/switch-ports !
    ProxyPass /api/discovery-jobs !
    ProxyPass /api/traps/snmp !

    ProxyPass /api http://127.0.0.1:8080/api
    ProxyPassReverse /api http://127.0.0.1:8080/api

    ErrorLog ${APACHE_LOG_DIR}/nac_error.log
    CustomLog ${APACHE_LOG_DIR}/nac_access.log combined
</VirtualHost>
