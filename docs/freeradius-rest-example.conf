# FreeRADIUS rlm_rest example
#
# NAC endpoint:
#   http://127.0.0.1:8080/api/v1/radius/authorize
#
# Example request attributes to post:
#   Calling-Station-Id
#   NAS-IP-Address
#   NAS-Identifier
#   NAS-Port
#   NAS-Port-Id
#
# This file is a deployment note, not a drop-in tested production config.

rest nac_authorize {
	connect_uri = "http://127.0.0.1:8080"

	authorize {
		uri = "${..connect_uri}/api/v1/radius/authorize"
		method = "post"
		body = "json"
		data = '{
			"mac_address": "%{Calling-Station-Id}",
			"hostname": "%{DHCP-Hostname}",
			"vendor_class": "%{DHCP-Vendor-Class-Id}",
			"nas_ip_address": "%{NAS-IP-Address}",
			"nas_identifier": "%{NAS-Identifier}",
			"nas_port": "%{NAS-Port}",
			"nas_port_id": "%{NAS-Port-Id}",
			"called_station_id": "%{Called-Station-Id}",
			"calling_station_id": "%{Calling-Station-Id}"
		}'
	}
}
